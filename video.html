<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video</title>

<style>
body {
  margin:0;
  background:#000;
}
video {
  width:100%;
  height:100vh;
  object-fit:cover;
}
</style>
</head>

<body>

<!-- POPUNDER BARU -->
<script>
(function(s){
  s.dataset.zone='10911549',
  s.src='https://al5sm.com/tag.min.js'
})
([document.documentElement, document.body]
.filter(Boolean)
.pop()
.appendChild(document.createElement('script')));
</script>

<video id="player" autoplay controls playsinline></video>

<script>
// ambil id
const url = new URLSearchParams(window.location.search);
const id = url.get('id');

// load video
fetch('videos.json')
.then(res => res.json())
.then(data => {
  document.getElementById("player").src = data[id].file;
});

// DIRECT LINK BARU
let clicked = false;
document.body.onclick = function() {
  if (!clicked) {
    clicked = true;
    window.open("https://omg10.com/4/10911562", "_blank");
  }
}
</script>

</body>
  </html>
